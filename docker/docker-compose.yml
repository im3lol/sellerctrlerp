services:
  postgres:
    image: postgres:16-alpine
    container_name: sellerctrl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sellerctrl
      POSTGRES_PASSWORD: sellerctrl
      POSTGRES_DB: sellerctrl
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sellerctrl"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: sellerctrl-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Creates the bucket on first boot.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/sellerctrl &&
      mc anonymous set download local/sellerctrl &&
      echo 'bucket ready';
      "

  adminer:
    image: adminer:latest
    container_name: sellerctrl-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  # The Next.js app. Enable with: docker compose --profile app up
  app:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.prebuilt
    container_name: sellerctrl-app
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgres://sellerctrl:sellerctrl@postgres:5432/sellerctrl
      S3_ENDPOINT: http://minio:9000
      AUTH_TRUST_HOST: "true"
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  pgdata:
  miniodata:
